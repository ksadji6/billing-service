spring.application.name=billing-service
spring.cloud.config.profile=dev

# Lien vers le Config Server
spring.config.import=optional:configserver:http://localhost:8888

server.port=${billing-service.uriport}
spring.datasource.url=${billing-service.datasource-url}
spring.datasource.username=${billing-service.username}
spring.datasource.password=${billing-service.password}

# Eureka
eureka.client.service-url.defaultZone=${billing-service.urlregistry}
eureka.instance.prefer-ip-address=true

spring.main.allow-bean-definition-overriding=true



# DÈsactive le check de santÈ qui fait passer le service en "DOWN"
management.health.rabbit.enabled=false

# DÈsactive les tentatives de reconnexion automatique
spring.rabbitmq.template.retry.enabled=false